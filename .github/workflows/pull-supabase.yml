name: Pull graph from Supabase

on:
  repository_dispatch:
    types: [supabase_graph_changed]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: graph-sync
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Verify database secret
        run: test -n "$DATABASE_URL" || { echo "SUPABASE_DATABASE_URL is not configured"; exit 1; }
      - name: Pull and validate database snapshot
        run: |
          python scripts/sync.py pull
          python scripts/sync.py check --format
      - name: Open snapshot pull request
        shell: bash
        run: |
          if git diff --quiet -- data/; then
            echo "Supabase and the data repository are already synchronized."
            exit 0
          fi

          branch="automation/supabase-pull"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$branch"
          git add data/
          git commit -m "Sync graph snapshot from Supabase"
          if remote_sha="$(git ls-remote --heads origin "refs/heads/$branch" | cut -f1)" && [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/$branch:$remote_sha" --set-upstream origin "$branch"
          else
            git push --set-upstream origin "$branch"
          fi
          if gh pr list --state open --head "$branch" --json number --jq 'length > 0' | grep -qx true; then
            echo "Updated the existing Supabase snapshot pull request."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Sync graph snapshot from Supabase" \
            --body "Automated deterministic snapshot from the curricula.live Supabase database. Review the concept and relation changes before merging.\n\nWorkflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
