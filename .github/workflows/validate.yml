name: Validate graph data

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Compile tooling
        run: python -m compileall -q scripts tests
      - name: Validate schemas, references, and formatting
        run: python scripts/sync.py check --format
      - name: Run tests
        run: pytest -q
